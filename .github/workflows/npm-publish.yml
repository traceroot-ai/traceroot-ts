name: Publish to npm

on:
  release:
    types: [published]

jobs:
  publish-sdk:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for npm provenance attestation via OIDC

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Fail fast — verify tag matches package.json before running build/tests
      - name: Verify release tag matches package version
        run: |
          PKG_VERSION=$(node -p "require('./packages/traceroot/package.json').version")
          TAG="${{ github.event.release.tag_name }}"
          TAG_VERSION="${TAG#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "❌ package.json version ($PKG_VERSION) does not match release tag ($TAG)"
            exit 1
          fi
          echo "✅ Version $PKG_VERSION matches tag $TAG"

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm --filter @traceroot-ai/traceroot test

      - name: Publish @traceroot-ai/traceroot
        run: pnpm --filter @traceroot-ai/traceroot publish --provenance --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
